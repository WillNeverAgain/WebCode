<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="《夙日不再》是一款战棋回合制ACG手游，回到不同的历史事件之中，探索历史的神秘冒险！">
  <meta name="keywords" content="夙日不再, 战棋手游, ACG, 灵能, 历史, 二次元">
  <meta name="author" content="群星工作室">
  <meta name="robots" content="index, follow">
  <title>夙日不再 | 官方网站</title>
  <link href="https://unpkg.com/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Serif SC', serif;
      margin: 0;
      background: #0a0a0f;
      color: #fff;
    }
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      z-index: 1000;
      box-sizing: border-box;
    }
    header h1 {
      font-size: 28px;
      color: #ffb84d;
      letter-spacing: 3px;
    }
    nav ul {
      display: flex;
      list-style: none;
      gap: 30px;
      max-width: 100%;
      width: 100%;
      overflow-x: hidden;
      flex-wrap: wrap;
      box-sizing: border-box;
    }
    nav ul li a {
      text-decoration: none;
      color: #fff;
      font-size: 16px;
      transition: color 0.3s;
    }
    nav ul li a:hover {
      color: #ffb84d;
    }
    .hero {
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('失重.jpg') center/cover no-repeat;
      filter: blur(5px);
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      background: rgba(10, 10, 15, 0.8);
      padding: 20px;
      border-radius: 10px;
    }
    .hero h2 {
      font-family: 'Dancing Script', cursive;
      font-size: 56px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px #ffb84d;
      color: #ffb84d;
      animation: fadeIn 1s ease-out;
    }
    .hero .subtitle {
      font-family: 'Dancing Script', cursive;
      font-size: 32px;
      color: #ffb84d;
      text-shadow: 0 0 10px #ffb84d;
      margin-bottom: 20px;
    }
    .hero p:not(.subtitle) {
      font-size: 20px;
      color: #ccc;
      max-width: 600px;
      line-height: 1.6;
      margin-left: auto;
      margin-right: auto;
    }
    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 28px;
      background: #ffb84d;
      color: #000;
      font-size: 18px;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s, transform 0.3s;
    }
    .btn:hover {
      background: #ff8c1a;
      transform: scale(1.05);
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #000;
      color: #666;
      font-size: 14px;
    }
    footer a {
      color: #ffb84d;
      text-decoration: none;
      margin: 0 10px;
    }
    footer a:hover {
      text-decoration: underline;
    }
    html {
      scroll-behavior: smooth;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 1s ease-out;
    }
    @media (max-width: 768px) {
      header {
        padding: 10px;
        flex-direction: column;
        gap: 10px;
      }
      nav ul {
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 100%;
        width: 100%;
        overflow-x: hidden;
      }
      nav ul li a {
        font-size: 14px;
      }
      .hero h2 {
        font-size: 40px;
      }
      .hero .subtitle {
        font-size: 24px;
      }
      .hero p:not(.subtitle) {
        font-size: 16px;
        padding: 0 20px;
      }
      .hero-content {
        padding: 10px;
      }
    }
    @media (max-width: 480px) {
      header {
        padding: 5px;
      }
      nav ul {
        gap: 6px;
      }
      nav ul li a {
        font-size: 13px;
      }
    }

    /* 全局复古纹理 + 噪点背景 */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: 
            linear-gradient(30deg, transparent 48%, rgba(70, 90, 110, 0.08) 50%, transparent 52%),
            linear-gradient(-30deg, transparent 48%, rgba(70, 90, 110, 0.06) 50%, transparent 52%),
            repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(30,35,45,0.05) 2px, rgba(30,35,45,0.05) 4px),
            repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(30,35,45,0.05) 2px, rgba(30,35,45,0.05) 4px),
            url('https://assets.codepen.io/3522978/noise.png'), 
            radial-gradient(circle at 30% 20%, #0a0f1a, #010101);
        background-blend-mode: overlay, screen, multiply, normal;
        opacity: 0.85;
        pointer-events: none;
        z-index: -2;
        transition: opacity 0.3s ease;
    }

    .halftone-overlay {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        pointer-events: none;
        mix-blend-mode: overlay;
        opacity: 0.12;
        z-index: -1;
        transition: opacity 0.3s ease;
    }

    .vintage-bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
        transition: opacity 0.3s ease;
    }
    .vintage-element {
        position: absolute;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.05;
        mix-blend-mode: multiply;
        animation: driftVintage linear infinite, pulseVintage 28s ease-in-out infinite alternate;
    }
    @keyframes driftVintage {
        0% { transform: translate(0, 0) rotate(0deg); }
        100% { transform: translate(110px, 110px) rotate(360deg); }
    }
    @keyframes pulseVintage {
        0% { opacity: 0.04; filter: brightness(0.9); }
        100% { opacity: 0.1; filter: brightness(1.1); }
    }
    .v1 { background-image: url('https://i0.wp.com/heritagecalling.com/wp-content/uploads/2024/12/DP114585-St-Marys-Church-Kempley-Gloucestershire.jpg?ssl=1'); width: 380px; height: 380px; top: 3%; left: 0%; animation-duration: 170s, 24s; transform: rotate(50deg); }
    .v2 { background-image: url('https://www.nationalww2museum.org/sites/default/files/2020-05/Riveter.jpg'); width: 550px; height: 180px; top: 18%; right: 4%; animation-duration: 190s, 28s; }
    .v3 { background-image: url('https://render.fineartamerica.com/images/rendered/default/greeting-card/images/artworkimages/medium/2/andy-warhol-high-resolution-photo-art-collage-andy-warhol-collage.jpg'); width: 280px; height: 450px; bottom: 8%; left: 6%; animation-duration: 150s, 20s; transform: rotate(-32deg); }
    .v4 { background-image: url('https://rubberdiamond.wordpress.com/wp-content/uploads/2014/01/schwitters.jpg'); width: 420px; height: 420px; top: 38%; left: 48%; animation-duration: 210s, 35s; transform: rotate(22deg); }
    .v5 { background-image: url('https://www.heritage-print.com/p/731/study-poster-1920-artist-lissitzky-15000613.jpg.webp'); width: 620px; height: 140px; bottom: 4%; right: 8%; animation-duration: 180s, 26s; }
    .v6 { background-image: url('https://blog.architizer.com/wp-content/uploads/deconstructivism.jpeg'); width: 230px; height: 560px; top: 6%; right: 1%; animation-duration: 160s, 22s; transform: rotate(90deg); }
    .v7 { background-image: url('https://d31sxl6qgne2yj.cloudfront.net/wordpress/wp-content/uploads/20190102164052/Punk-Album-Covers-11x16.jpg'); width: 460px; height: 330px; bottom: 28%; left: 28%; animation-duration: 200s, 30s; transform: rotate(-28deg); }
    .v8 { background-image: url('https://smarthistory.org/wp-content/uploads/2021/02/50935568273_37699017c0_o-scaled.jpg'); width: 350px; height: 130px; top: 50%; left: 12%; animation-duration: 140s, 18s; }
    .v9 { background-image: url('https://postergroup.com/cdn/shop/products/Men-Working-Together-Poster.jpg?v=1746051175'); width: 180px; height: 400px; top: 12%; left: 62%; animation-duration: 230s, 38s; transform: rotate(72deg); }
    .v10 { background-image: url('https://m.media-amazon.com/images/I/81SOUO-NbkL.jpg'); width: 560px; height: 280px; bottom: 18%; right: 22%; animation-duration: 170s, 27s; }
    .v11 { background-image: url('https://cdn.britannica.com/94/5594-050-1C1166D6/Annunciation-Fra-Angelico-Florence-Museum-of-San.jpg'); width: 300px; height: 300px; top: 62%; left: 40%; animation-duration: 220s, 32s; transform: rotate(-45deg); }
    .v12 { background-image: url('https://cdn11.bigcommerce.com/s-yzgoj/images/stencil/1280x1280/products/1320435/1708788/PSTJPA100339M__22686.1519281927.jpg?c=2'); width: 440px; height: 220px; top: 30%; left: 4%; animation-duration: 180s, 25s; }
    .v13 { background-image: url('https://divinity.uchicago.edu/sites/default/files/styles/sightings_article_featured_image/public/2020-01/2c304455-66ca-4ae4-adc3-ba0ccc06b408_1_201_a.jpeg?itok=9v54XcIG'); width: 400px; height: 350px; top: 8%; left: 55%; animation-duration: 160s, 23s; transform: rotate(30deg); }
    .v14 { background-image: url('https://www.saic.edu/sites/default/files/shorthand/stories/0Hw0PwtaAa/2025-09-29T19%3A38%3A15.732Z/assets/vpUp9CR2Fi/kurt-schwitters-843x626.jpg'); width: 500px; height: 200px; bottom: 35%; right: 10%; animation-duration: 190s, 27s; }
    .v15 { background-image: url('https://cdn.kastatic.org/ka-perseus-images/aa552552150213036b99363b0dfb8ae811b8c08d.jpg'); width: 350px; height: 400px; top: 45%; right: 15%; animation-duration: 200s, 30s; transform: rotate(-20deg); }
  </style>
</head>
